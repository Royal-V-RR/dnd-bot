name: DnD Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
- name: Checkout repository
  uses: actions/checkout@v4
  with:
    token: ${{ secrets.GH_TOKEN }}
    fetch-depth: 0

- name: Configure Git
  run: |
    git config user.name "DnD Bot"
    git config user.email "dnd-bot@github-actions"
    git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Royal-V-RR/dnd-bot.git

- name: Run bot (6 hours)
  env:
    DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
    CLIENT_ID: '1500567588214673498'
    GH_TOKEN: ${{ secrets.GH_TOKEN }}
    GH_REPO: Royal-V-RR/dnd-bot
    CAMPAIGN_DIR: campaigns
        run: |
          timeout 21300 node index.cjs || true

      - name: Pull latest before push
        if: always()
        run: |
          git pull --rebase origin main || true

      - name: Commit and push any data changes
        if: always()
        run: |
          git add campaigns/ || true
          git diff --staged --quiet || git commit -m "chore: auto-save campaign data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push || true
